version: "3.8"

services:
  bakustore-db:
    image: postgres:13.2-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - bakustore-db-vol:/var/lib/postgresql/data
    networks:
      - bakustore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  bakustore-back:
    build: ./backend
    container_name: bakustore-backend
    environment:
          SPRING_DATASOURCE_URL: jdbc:postgresql://bakustore-db:5432/postgres
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
          - "8080:8090"
    depends_on:
          bakustore-db:
            condition: service_healthy
    networks:
      - bakustore-network
    
networks:
  bakustore-network:
    driver: bridge

volumes:
  bakustore-db-vol:
